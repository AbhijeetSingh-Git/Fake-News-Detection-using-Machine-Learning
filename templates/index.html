<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fake News Detection</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f4f7fb; color: #1f2937; }
      .container { max-width: 900px; margin: 40px auto; padding: 24px; background: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
      h1 { text-align: center; color: #2563eb; }
      textarea { width: 100%; min-height: 180px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; }
      button { margin-top: 12px; padding: 10px 18px; border: none; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
      .result { margin-top: 20px; padding: 14px; border-radius: 8px; background: #eff6ff; }
      .small { color: #475569; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Fake News Detection using Machine Learning</h1>
      <p class="small">Paste an article or headline to check whether it looks fake or real.</p>
      <textarea id="article" placeholder="Enter article text here..."></textarea>
      <button onclick="predictNews()">Predict</button>
      <div id="result" class="result" style="display:none;"></div>
    </div>

    <script>
      async function predictNews() {
        const article = document.getElementById('article').value;
        const resultBox = document.getElementById('result');
        resultBox.style.display = 'block';
        resultBox.innerHTML = 'Analyzing...';

        const response = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ article })
        });

        const data = await response.json();
        if (data.error) {
          resultBox.innerHTML = `<strong>Error:</strong> ${data.error}`;
        } else {
          resultBox.innerHTML = `
            <strong>Prediction:</strong> ${data.prediction}<br>
            <strong>Confidence:</strong> ${data.confidence}%<br>
            <strong>Real Probability:</strong> ${data.probability_real}%<br>
            <strong>Fake Probability:</strong> ${data.probability_fake}%
          `;
        }
      }
    </script>
  </body>
</html>
